<!DOCTYPE html>
<!--
  Mockup của: eProcurement_Login (Buyer Portal)
  Nguồn thực tế: KHÔNG phải Vue component (src-vbizhw Login.vue có <template> đã bị comment hết,
  chỉ redirect sang OAuth). Màn hình login thật được server-side render bởi service-oauth:
    src-jbizhw/bizhighway-service/service-oauth/src/main/resources/templates/login/standard-login.html
    + static/css/common.css
  Mockup này copy 1:1 HTML/CSS gốc (Thymeleaf th:* đã thay bằng giá trị tĩnh để xem offline).
  Khối "デモ用ユーザー" và nút "SAMLでログイン" là có điều kiện trong production
  (chỉ hiện khi useDemoUsers / samlRegistrationId được cấu hình cho company group đó) — giữ lại ở đây
  để thấy đầy đủ layout, có thể ẩn/xoá khi review với khách.
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログインする</title>
  <style>
    body {
      margin: 0;
      font-family: Meiryo, sans-serif;
    }

    *, :after, :before {
      box-sizing: border-box;
    }

    .center-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100vh;
      padding: 1rem;
    }

    .card {
      width: 450px;
      padding: 3rem;
      border-radius: 1rem;
      background-color: #232f3e;
      color: #fff;
      margin: auto;
      max-width: 100%;
    }

    .header-logo {
      margin-bottom: 1.5rem;
    }
    .header-logo img {
      max-width: 100%;
    }
    .footer-logo {
      margin-top: 1rem;
    }
    .footer-logo img {
      width: 60px;
    }

    .input-form {
      margin-bottom: 1rem;
    }

    .input-group {
      margin-bottom: .7rem;
    }

    .input {
      height: 38px;
      position: relative;
    }

    input[type="text"], input[type="password"], input[type="email"], select {
      display: block;
      width: 100%;
      padding: .375rem .75rem;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.5;
      color: #212529;
      border: 1px solid #dee2e6;
      border-radius: .375rem;
    }

    input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
      border-color: #86b7fe;
      outline: none;
      box-shadow: 0 0 0 .25rem #0d6efd40;
    }

    input[type="submit"] {
      width: 100%;
      color: #fff;
      margin-top: .5rem;
      background-color: #1a9bd5;
      cursor: pointer;
      transition: all .2s;
      border: none;
    }

    input[type="submit"]:hover {
      background-color: #559f59;
    }

    input.error {
      border-color: #dc3545;
    }

    .text-danger {
      text-align: left;
      color: #dc3545;
    }

    .btn {
      display: inline-block;
      padding: .5rem 1rem;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.5;
      border: 1px transparent;
      border-radius: .5rem;
    }

    .saml-btn {
      background-color: #f16385;
      color: #51141e;
      text-decoration: none;
      transition: all .2s;
    }

    .saml-btn:hover {
      background-color: #f4a7be;
      color: #51141e;
    }

    .remember {
      margin-top: .5rem;
      text-align: left;
    }

    .remember input[type="checkbox"], .remember label {
      cursor: pointer;
    }

    .forgot-password {
      font-size: .8rem;
      color: #fff;
      text-decoration: none;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    a.back-link {
      color: #0d6efd;
      text-decoration: none;
    }

    a.back-link:hover {
      text-decoration: underline;
    }

    .demo-user {
      margin-top: 1rem;
      border-radius: .375rem;
      border: 1px solid rgba(255,255,255,.25);
    }

    .demo-user__list {
      text-align: left;
    }

    .drop-label {
      cursor: pointer;
    }

    .drop-label:after {
      display: inline-block;
      margin-left: .255em;
      vertical-align: .255em;
      content: "";
      border-top: .3em solid;
      border-right: .3em solid transparent;
      border-bottom: 0;
      border-left: .3em solid transparent;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #fff;
      min-width: 10rem;
      overflow: auto;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      padding: .5rem 0;
      font-size: 1rem;
      color: #212529;
      border: 1px rgba(0, 0, 0, .175);
      border-radius: .375rem;
      z-index: 1;
    }

    .dropdown-content div {
      color: black;
      padding: .25rem 1rem;
      text-decoration: none;
      display: block;
      cursor: pointer;
    }

    .dropdown-content div:hover {
      background-color: #f1f1f1;
    }

    .show {
      display: block;
    }

    /* Mobile Responsive Styles (giống common.css gốc) */
    @media (max-width: 768px) {
      .center-screen {
        align-items: flex-start;
        padding: 0;
        height: 100vh;
        min-height: 100vh;
      }

      .card {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        border-radius: 0;
        padding: 2rem 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
      }

      .input-group {
        margin-bottom: 1rem;
      }

      .btn {
        padding: .75rem 1rem;
        font-size: 1.1rem;
        min-height: 48px;
      }

      input[type="submit"] {
        margin-top: 1rem;
        min-height: 48px;
      }

      .remember {
        margin: 1.5rem 0;
      }

      .remember input[type="checkbox"] {
        transform: scale(1.2);
        margin-right: 0.5rem;
      }

      .forgot-password {
        display: none;
      }

      .footer-logo {
        margin-top: 2rem;
      }

      .footer-logo img {
        width: 50px;
      }

      .saml-btn {
        width: 100%;
        margin-top: 1rem;
        min-height: 48px;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.5rem 1rem;
      }

      .btn {
        font-size: 1rem;
      }
    }
  </style>
</head>

    <form class="input-form" id="loginForm">
      <div class="input-group">
        <label for="companyGroup"></label>
        <input id="companyGroup" type="text" name="companyGroup" placeholder="企業グループコード" maxlength="50" autofocus>
        <div id="companyGroupError" class="text-danger"></div>
      </div>

      <div class="input-group">
        <label for="username"></label>
        <input id="username" type="text" name="username" placeholder="ユーザーID" maxlength="100">
        <div id="usernameError" class="text-danger"></div>
      </div>

      <div class="input-group">
        <label for="password"></label>
        <input id="password" type="password" name="password" placeholder="パスワード" maxlength="50">
        <div id="passwordError" class="text-danger"></div>
      </div>

      <input type="submit" class="btn" value="ログイン">

      <div class="remember">
        <input type="checkbox" id="rememberInput" value="true" checked>
        <label for="rememberInput">ログイン情報を保持する</label>
      </div>
    </form>

    <a href="#" class="forgot-password">
      企業グループコード、ユーザーID、パスワードを<br>お忘れの方はこちら
    </a>

      <div class="demo-user__list demo-user__buyer">

        <div class="dropdown-content">
          <div>発注担当者（requester）</div>
          <div>承認者1（approver1）</div>
          <div>購買担当者（purchaser）</div>
        </div>
      </div>
      <div class="demo-user__list demo-user__group-admin">
        <div class="drop-label">サプライヤ</div>
        <div class="dropdown-content">
          <div>グループ管理者（com_group_admin）</div>
        </div>
      </div>
    </fieldset>
