<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マスタメンテナンス</title>
<link rel="stylesheet" href="assets/layout.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Meiryo, "Helvetica Neue", "Helvetica", "Arial", sans-serif; color: #111111; line-height: 1.43; font-size: 14px; background: #ffffff; }
  a { text-decoration: none; color: inherit; }

  .page-content { padding: 0 1.5rem 3rem; }

  .breadcrumb { background: #f7f7f7; padding: .35rem 1.3rem; font-size: .8rem; margin: 0 -1.5rem; list-style: none; display: flex; }
  .breadcrumb li { display: flex; align-items: center; }
  .breadcrumb li + li::before { content: "\203A"; font-weight: bold; margin: 0 .5rem; }
  .breadcrumb a { color: #111111; text-decoration: underline; cursor: pointer; }
  .breadcrumb .active { color: #111111; }

  /* ===== Setting header (title on top-left, controls to the right) ===== */
  .setting-header {
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: .9rem 1rem;
    padding: 1.2rem 0 1.6rem;
  }
  .setting-header .page-title-text { font-size: 2.1rem; font-weight: normal; color: #333; white-space: nowrap; }
  .controls-group { display: flex; align-items: center; flex-wrap: wrap; gap: .6rem; }
  .filter-label { color: #6c757d; font-size: .95rem; white-space: nowrap; }
  .os-select {
    width: 360px; max-width: 42vw; padding: .5rem .8rem; border: 1px solid #ccc; border-radius: 4px; font-size: .92rem; background: #fff; color: #6c757d;
  }
  .setting-filter { display: flex; border: 1px solid #d0d5dd; border-radius: 6px; overflow: hidden; }
  .setting-filter .tab-btn {
    padding: .55rem 1.1rem; font-size: .95rem; cursor: pointer; background: #fff; color: royalblue; border: none;
    border-right: 1px solid #d0d5dd; white-space: nowrap;
  }
  .setting-filter .tab-btn:last-child { border-right: none; }
  .setting-filter .tab-btn.active { background: royalblue; color: #fff; border-radius: 5px; }
  .search-box { width: 220px; }
  .search-box input { width: 100%; padding: .55rem .8rem; border: 1px solid #ccc; border-radius: 4px; font-size: .92rem; }

  /* ===== マスタメニューリンク一覧 (collapsible) ===== */
  .link-list-card { background: #edf1f6; margin-bottom: 2rem; }
  .link-list-header {
    background: royalblue; color: #ffffff; padding: 1rem 1.4rem; font-weight: bold; font-size: 1.35rem;
    cursor: pointer; display: flex; align-items: center; gap: .7rem; user-select: none;
  }
  .link-list-header .chevron { transition: transform .2s; font-size: 1.1rem; color: #ffffff; line-height: 1; }
  .link-list-header.open .chevron { transform: rotate(180deg); }
  .link-list-body { display: none; padding: 1.2rem 1.4rem; }
  .link-list-body.show { display: flex; flex-wrap: wrap; gap: 1.4rem 2rem; }
  .link-list-group { min-width: 180px; flex: 1; }
  .link-list-group h6 { color: #333; font-weight: bold; font-size: 1rem; margin: 0 0 .5rem; }
  .link-list-group a {
    display: block; font-size: .86rem; padding: .3rem 0; color: #111; cursor: pointer;
  }
  .link-list-group a::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: royalblue; display: inline-block; margin-right: 6px; }
  .link-list-group a:hover { color: #4169e1; text-decoration: underline; }

  /* ===== Group sections ===== */
  .setting-group { margin-bottom: 2.2rem; }
  .setting-group h5 { font-weight: bold; font-size: 1.15rem; margin: 0 0 .6rem; }
  .setting-group hr { border: none; border-top: 1px solid #ddd; margin: 0 0 1.3rem; }
  .setting-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem 0; }
  @media (max-width: 1100px) { .setting-grid { grid-template-columns: repeat(2, 1fr); } }
  .setting-item {
    text-align: center; padding: 1.1rem .6rem; cursor: pointer; border-radius: 3px; transition: box-shadow .2s;
  }
  .setting-item:hover { box-shadow: 0 1px 2px 1px rgba(65,105,225,.5); }
  .setting-item .icon-wrap { width: 30%; max-width: 64px; margin: 0 auto .6rem; }
  .setting-item .icon-wrap svg { width: 100%; height: 100%; }
  .setting-item .item-title { font-size: 1.05rem; margin-bottom: .5rem; }
  .setting-item .item-desc {
    font-size: .8rem; color: #6c757d; max-width: 220px; margin: 0 auto;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .empty-note { text-align: center; color: #888; padding: 3rem 0; font-size: .95rem; }
</style>
</head>

<div id="layout-header"></div>

<div id="wrapper">

      <li class="active">マスタメンテナンス</li>

            <option value="j2demo">J2Demo株式会社</option>
            <option value="jienie-lab">ジーニーラボ株式会社</option>
          </select>
          <div class="setting-filter" id="settingFilter">
            <button type="button" class="tab-btn" data-tab="10">バイヤ</button>
            <button type="button" class="tab-btn active" data-tab="90">サービス提供会社</button>
          </div>
          <div class="search-box">
            <input type="text" id="filterText" maxlength="100" placeholder="キーワードで絞り込み">
          </div>
        </div>
      </div>

      <div class="link-list-card">
        <div class="link-list-header" id="linkListHeader">
          <span class="chevron">&#8743;</span>
          <span>マスタメニューリンク一覧</span>
        </div>
        <div class="link-list-body" id="linkListBody"></div>
      </div>

      <div id="groupSections"></div>

    </div>
  </main>
</div>

  // ===== DATA MODEL (copy tu MasterSettingData.js + ja.json, thu gon chi con field can dung) =====
  // group label: SYSTEM_ADMIN_GROUP="システム基本設定", PURCHASE_BASIC_SETTING="購買基本設定", PURCHASE_FUNCTION_SETTING="購買取引機能設定"
  var GROUP_LABEL = { SYSTEM_ADMIN_GROUP: "システム基本設定", PURCHASE_BASIC_SETTING: "購買基本設定", PURCHASE_FUNCTION_SETTING: "購買取引機能設定" };
  var GROUP_ORDER = ["SYSTEM_ADMIN_GROUP", "PURCHASE_BASIC_SETTING", "PURCHASE_FUNCTION_SETTING"];

  var MASTER_DATA = {
    // masterType "90" — サービス提供会社（Provider）
    "90": [
      { id: "COMPANY_GROUP", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.icon7, title: "サービス提供会社グループ管理", desc: "" },
      { id: "COMPANY", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.icon8, title: "サービス提供会社管理", desc: "" },
      { id: "COUNTRY", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.flag, title: "対応国管理", desc: "" },
      { id: "USER", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.userCog, title: "サービス提供会社 ユーザー管理", desc: "" },
      { id: "TAX_RATE", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.table, title: "税率管理", desc: "" },
      { id: "COMPANY_GROUP_IDP", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.info, title: "IDプロバイダー管理", desc: "" },
      { id: "PURCHASE_STATUS", group: "PURCHASE_FUNCTION_SETTING", icon: ICONS.sortUp, title: "購買ステータス", desc: "購買担当者画面で見積の進捗状況を把握するためのステータスを管理します。" }
    ],
    // masterType "999" — COMMON（chi merge khi xem tab 90, dung logic thuc mixin.js）
    "999": [
      { id: "ROLE", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.userTag, title: "権限設定", desc: "ユーザーの利用権限・承認権限等の付与設定を行います。" },
      { id: "PASSWORD_RULE", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.key, title: "パスワードルール設定", desc: "パスワードルールを設定します。" },
      { id: "CURRENCY", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.yen, title: "対応通貨管理", desc: "" },
      { id: "PAYMENT_SITE", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.idBadge, title: "サービス提供会社支払サイトカテゴリ管理", desc: "システムとして共通で使用する支払サイトカテゴリの登録・管理を行います。" },
      { id: "BUYER_GROUP_PAYMENT_SITE", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.idBadge, title: "サービス提供会社支払サイト管理", desc: "システムとして共通で使用する支払サイトの登録・管理を行います。" }
    ],
    // masterType "10" — バイヤ（KHONG merge COMMON, dung logic thuc mixin.js）
    "10": [
      { id: "COMPANY_GROUP", group: "SYSTEM_ADMIN_GROUP", icon: ICONS.icon7, title: "会社グループ基本情報設定", desc: "会社グループで共通の基本情報を設定します。" },
      { id: "DIRECT_TRADING", group: "PURCHASE_BASIC_SETTING", icon: ICONS.userPlus, title: "サプライヤ情報登録", desc: "サプライヤ情報の登録や取引に利用する設定をおこないます。" },
      { id: "BIZ_TRADING", group: "PURCHASE_FUNCTION_SETTING", icon: ICONS.circle, title: "サプライヤ一覧・Biz取引", desc: "BizHiwayで取引するサプライヤを管理します。" },
      { id: "SETTING_DISPLAY_SUPPLIER", group: "PURCHASE_FUNCTION_SETTING", icon: ICONS.clipboardList, title: "サプライヤ一覧表示設定", desc: "サプライヤリコメンデーション機能にてリコメンド時に表示するサプライヤ情報項目とリコメンドロジックの優先順を設定します。" },
      { id: "BIZ_PAYMENT", group: "PURCHASE_FUNCTION_SETTING", icon: ICONS.creditCard, title: "BizHiway利用設定", desc: "BizHiwayで利用する支払先コード等を設定します。" }
    ]
  };

  function currentItems(tab) {
    // dung dung logic mixin.js: 90 -> merge(90, 999) ; 10 -> chi 10
    if (tab === "90") return MASTER_DATA["90"].map(function (i) { return Object.assign({ masterType: "90" }, i); })
      .concat(MASTER_DATA["999"].map(function (i) { return Object.assign({ masterType: "999" }, i); }));
    return MASTER_DATA["10"].map(function (i) { return Object.assign({ masterType: "10" }, i); });
  }

  function groupBy(items) {
    var byGroup = {};
    items.forEach(function (item) { (byGroup[item.group] = byGroup[item.group] || []).push(item); });
    return GROUP_ORDER.filter(function (g) { return byGroup[g]; }).map(function (g) { return { group: g, items: byGroup[g] }; });
  }

  var state = { tab: "90", keyword: "" };

  function itemCardHtml(item) {
    return '<div class="setting-item" data-nav="マスタ設定詳細画面（eProcurement_Settings_MasterManagement_MasterSettingItem, masterType=' + item.masterType + ', masterDataType=' + item.id + '）">' +
      '<div class="icon-wrap">' + item.icon + '</div>' +
      '<div class="item-title">' + item.title + '</div>' +
      (item.desc ? '<div class="item-desc" title="' + item.desc + '">' + item.desc + '</div>' : '') +
      '</div>';
  }

  function linkListHtml(item) {
    return '<a href="#" data-nav="マスタ設定詳細画面（eProcurement_Settings_MasterManagement_MasterSettingItem, masterType=' + item.masterType + ', masterDataType=' + item.id + '）">' + item.title + '</a>';
  }

  function render() {
    var allItems = currentItems(state.tab);

    // マスタメニューリンク一覧 -- KHONG filter theo keyword (dung logic thuc: groupItemHeader dung masterSettingDataType)
    var linkGroups = groupBy(allItems);
    document.getElementById('linkListBody').innerHTML = linkGroups.map(function (g) {
      return '<div class="link-list-group"><h6>' + GROUP_LABEL[g.group] + '</h6>' + g.items.map(linkListHtml).join('') + '</div>';
    }).join('');

    // Luoi card chinh -- CO filter theo keyword (dung logic thuc: groupFilter)
    var kw = state.keyword.trim().toLowerCase();
    var filtered = allItems.filter(function (item) {
      if (!kw) return true;
      return item.title.toLowerCase().includes(kw) || (item.desc && item.desc.toLowerCase().includes(kw));
    });
    var mainGroups = groupBy(filtered);
    var sectionsEl = document.getElementById('groupSections');
    if (mainGroups.length === 0) {
      sectionsEl.innerHTML = '<div class="empty-note">該当するマスタ設定項目が見つかりません。</div>';
    } else {
      sectionsEl.innerHTML = mainGroups.map(function (g) {
        return '<div class="setting-group"><h5>' + GROUP_LABEL[g.group] + '</h5><hr>' +
          '<div class="setting-grid">' + g.items.map(itemCardHtml).join('') + '</div></div>';
      }).join('');
    }
    JienieLayout.bindDataNavToasts();
  }

  // ===== Tab switch =====
  document.querySelectorAll('#settingFilter .tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('#settingFilter .tab-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      state.tab = btn.getAttribute('data-tab');
      render();
    });
  });

  // ===== Search filter (live) =====
  document.getElementById('filterText').addEventListener('input', function (e) {
    state.keyword = e.target.value;
    render();
  });

  // ===== Collapsible link list (mac dinh dong, dung theo data() thuc isShow=false) =====
  document.getElementById('linkListHeader').addEventListener('click', function () {
    this.classList.toggle('open');
    document.getElementById('linkListBody').classList.toggle('show');
  });

  // ===== One Source company group select =====
  document.getElementById('osSelect').addEventListener('change', function (e) {
    if (!e.target.value) return;
    var label = e.target.options[e.target.selectedIndex].text;
    JienieLayout.toast('実際の画面では「' + label + '」のBuyer環境へSSO遷移します');
    e.target.value = "";
  });

  render();
</script>
