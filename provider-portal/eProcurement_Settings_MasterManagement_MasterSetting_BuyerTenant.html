<!DOCTYPE html>
<!--
  Mockup: マスタメンテナンス（バイヤテナント）画面
  route name: eProcurement_Settings_MasterManagement_MasterSetting
  URL tham chiếu: https://demo.staging.jienie.com/eProcurement/Settings/MasterManagement/MasterSetting
  → Đây là màn hình "provider portal sau khi đã chọn 1 buyer": Provider chọn 1 会社グループ (buyer)
    trong dropdown 絞り込み条件 rồi SSO sang môi trường Buyer (demo tenant). Màn hiện ra là
    マスタメンテナンス của BUYER với ĐẦY ĐỦ 7 nhóm master.

  ⚠️ GHI CHÚ: Tại thời điểm dựng, demo.staging đang bảo trì ("ただいまメンテナンス中です" 01:00–05:00)
     nên KHÔNG chụp được layout thật. Toàn bộ nội dung dưới đây dựng 100% từ SOURCE CODE THẬT
     (không suy đoán UI). Cần đối chiếu lại với trang thật khi hết bảo trì.

  NGUỒN THẬT (đọc trực tiếp repo):
    - Component: src-vbizhw/src/views/Management/Home.vue (app BUYER).
      * setting_filter khởi tạo = BUYER_DIVISION_CODE ("10") → chỉ hiển thị master của buyer.
      * Tab pills: chỉ tab バイヤ (MASTER_SETTING.BUYER) hiện với buyer; tab サービス提供会社(90)
        CHỈ hiện khi userCompanyDivisionCode === PROVIDER → với buyer tenant chỉ có 1 tab.
      * Tiêu đề trang: $t('ANTI_COMPANY_JUDGMENT.LB_002') = "マスタメンテナンス".
      * Dropdown 会社グループ: hiện khi companyGroupList.length>0 (chọn → directSSO sang buyer khác).
      * Ô tìm kiếm: placeholder MASTER_SETTING.PRODUCT_CATEGORY_LB_043 = "キーワードで絞り込み",
        filter theo title+description CHỈ áp cho lưới card chính (groupFilter), KHÔNG áp cho
        「マスタメニューリンク一覧」(groupItemHeader dùng masterSettingDataType KHÔNG filter).
      * Card 「マスタメニューリンク一覧」mặc định ĐÓNG (isShow=false); chevron ∧ khi đóng, ∨ khi mở.
        Header nhóm trong link-list dùng màu #4169e1 (theo Home.vue h6).
    - Data model: src-vbizhw/src/constants/MasterSettingData.js masterType "10" (BUYER).
    - Thứ tự nhóm cố định (mixin.js getGroupMaster): SYSTEM_ADMIN_GROUP → ORG_RELATED_SETTING →
      ACCOUNT_SETTING → PURCHASE_BASIC_SETTING → PURCHASE_COMMON_SETTING →
      PURCHASE_FUNCTION_SETTING → NOTIFICATION_SETTING. Item trong 1 nhóm giữ nguyên thứ tự
      xuất hiện trong MasterSettingData.js.
    - Nhãn nhóm (locales/prod/ja.json): システム基本設定 / 組織関連設定 / 会計・経理 /
      購買基本設定 / 購買共通機能設定 / 購買取引機能設定 / その他機能管理.
    - Text title/description: NGUYÊN VĂN từ ja.json (đã grep từng key).
    - Icon: <img> trỏ TRỰC TIẾP tới file .svg thật trong repo
      (../../../../src-vbizhw/src/assets/img/eProcurement/master/*.svg) — các svg đã có sẵn
      fill="#4169e1". Ưu điểm: đúng 100% icon thật. Nếu cần mockup tự đóng gói (portable), có
      thể copy các svg này vào assets/ và đổi ICON_BASE.

  ITEM ĐÃ LƯỢC BỎ (có trong source nhưng là master phụ/con, thường truy cập trong màn cha,
  không hiện thành card ở trang home — cần xác nhận với trang thật):
    BILL_ONE_LINK (biến thể COMPANY khi bật BillOne), USER_ORGANIZATION, ACCEPTANCE_GROUP_USER,
    ACCEPTANCE_GROUP_CATEGORY, ACCEPTANCE_GROUP_ORGANIZATION, PURCHASE_GROUP_USER,
    PURCHASE_GROUP_RULE, APPROVAL_GROUP_USER, BUDGET_MANAGEMENT (không có group/title/icon).
  SEARCH_DICTIONARY: source chỉ hiện khi buyerSwitch.isCatalogPurchasing && isUsePharmacyFunction
    → ở đây vẫn hiển thị (demo bật đủ), đánh dấu điều kiện.

  Header/Sidebar: dùng chung ../assets/layout.css + assets/layout.js của provider-portal (khung
  mockup dự án). Menu sidebar buyer thật khác provider — có thể tinh chỉnh sau nếu cần.
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マスタメンテナンス</title>
<link rel="stylesheet" href="assets/layout.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Meiryo, "Helvetica Neue", "Helvetica", "Arial", sans-serif; color: #111111; line-height: 1.43; font-size: 14px; background: #ffffff; }
  a { text-decoration: none; color: inherit; }

  .page-content { padding: 0 1.5rem 3rem; }

  .breadcrumb { background: #f7f7f7; padding: .35rem 1.3rem; font-size: .8rem; margin: 0 -1.5rem; list-style: none; display: flex; }
  .breadcrumb li { display: flex; align-items: center; }
  .breadcrumb li + li::before { content: "\203A"; font-weight: bold; margin: 0 .5rem; }
  .breadcrumb .active { color: #111111; }

  /* ===== Setting header (title left, controls right) ===== */
  .setting-header {
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: .9rem 1rem;
    padding: 1.2rem 0 1.6rem;
  }
  .setting-header .page-title-text { font-size: 2.1rem; font-weight: normal; color: #333; white-space: nowrap; }
  .controls-group { display: flex; align-items: center; flex-wrap: wrap; gap: .6rem; }
  .os-select {
    width: 300px; max-width: 42vw; padding: .5rem .8rem; border: 1px solid #ccc; border-radius: 4px; font-size: .92rem; background: #fff; color: #6c757d;
  }
  .setting-filter { display: flex; border: 1px solid #d0d5dd; border-radius: 6px; overflow: hidden; }
  .setting-filter .tab-btn {
    padding: .55rem 1.3rem; font-size: .95rem; cursor: pointer; background: #fff; color: royalblue; border: none; white-space: nowrap;
  }
  .setting-filter .tab-btn.active { background: royalblue; color: #fff; border-radius: 5px; }
  .search-box { width: 220px; }
  .search-box input { width: 100%; padding: .55rem .8rem; border: 1px solid #ccc; border-radius: 4px; font-size: .92rem; }

  /* ===== マスタメニューリンク一覧 (collapsible) ===== */
  .link-list-card { background: #edf1f6; margin-bottom: 2rem; }
  .link-list-header {
    background: royalblue; color: #ffffff; padding: 1rem 1.4rem; font-weight: bold; font-size: 1.35rem;
    cursor: pointer; display: flex; align-items: center; gap: .7rem; user-select: none;
  }
  .link-list-header .chevron { transition: transform .2s; font-size: 1.1rem; color: #ffffff; line-height: 1; }
  .link-list-header.open .chevron { transform: rotate(180deg); }
  .link-list-body { display: none; padding: 1.2rem 1.4rem; }
  .link-list-body.show { display: flex; flex-wrap: wrap; gap: 1.2rem 1.6rem; }
  .link-list-group { width: calc(16.66% - 1.4rem); min-width: 150px; }
  .link-list-group h6 { color: #4169e1; font-weight: bold; font-size: .95rem; margin: 0 0 .5rem; }
  .link-list-group a { display: block; font-size: .84rem; padding: .28rem 0; color: #111; cursor: pointer; }
  .link-list-group a::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: royalblue; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .link-list-group a:hover { color: #4169e1; text-decoration: underline; }

  /* ===== Group sections ===== */
  .setting-group { margin-bottom: 2.4rem; }
  .setting-group h5 { font-weight: bold; font-size: 1.25rem; margin: 0 0 .6rem; }
  .setting-group hr { border: none; border-top: 1px solid #ddd; margin: 0 0 1.4rem; }
  .setting-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem 0; }
  @media (max-width: 1100px) { .setting-grid { grid-template-columns: repeat(2, 1fr); } }
  .setting-item { text-align: center; padding: 1.1rem .6rem; cursor: pointer; border-radius: 3px; transition: box-shadow .2s; }
  .setting-item:hover { box-shadow: 0 1px 2px 1px rgba(65,105,225,.5); }
  .setting-item .icon-wrap { width: 30%; max-width: 64px; margin: 0 auto .7rem; }
  .setting-item .icon-wrap img { width: 100%; height: auto; display: block; }
  .setting-item .item-title { font-size: 1.1rem; margin-bottom: .55rem; }
  .setting-item .item-desc {
    font-size: .8rem; color: #6c757d; max-width: 82%; margin: 0 auto;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .empty-note { text-align: center; color: #888; padding: 3rem 0; font-size: .95rem; }
</style>
</head>
<body>

<div id="layout-header"></div>

<div id="wrapper">
  <div id="layout-sidebar"></div>

  <main id="wrapper-content">
    <ul class="breadcrumb">
      <li class="active">マスタメンテナンス</li>
    </ul>

    <div class="page-content">

      <div class="setting-header">
        <div class="page-title-text">マスタメンテナンス</div>
        <div class="controls-group">
          <select class="os-select" id="osSelect">
            <option value="">------</option>
            <option value="j2demo">[J2DEMO] J2Demo株式会社</option>
            <option value="andy-hd">[ANDY] アンディホールディングス</option>
          </select>
          <div class="setting-filter" id="settingFilter">
            <button type="button" class="tab-btn active" data-tab="10">バイヤ</button>
          </div>
          <div class="search-box">
            <input type="text" id="filterText" maxlength="100" placeholder="キーワードで絞り込み">
          </div>
        </div>
      </div>

      <div class="link-list-card">
        <div class="link-list-header" id="linkListHeader">
          <span class="chevron">&#8743;</span>
          <span>マスタメニューリンク一覧</span>
        </div>
        <div class="link-list-body" id="linkListBody"></div>
      </div>

      <div id="groupSections"></div>

    </div>
  </main>
</div>

<div id="layout-fab"></div>
<div id="mockToast"></div>

<script src="assets/layout.js"></script>
<script>
  JienieLayout.init();

  // Icon that (svg) doc truc tiep tu repo — da co fill #4169e1 san.
  var ICON_BASE = '../../../../src-vbizhw/src/assets/img/eProcurement/master/';

  // DATA MODEL (copy tu MasterSettingData.js masterType "10" + ja.json). Thu tu nhom = getGroupMaster.
  var GROUPS = [
    { label: "システム基本設定", items: [
      { id: "COMPANY_GROUP", icon: "mastersettingicon7", title: "会社グループ基本情報設定", desc: "会社グループで共通の基本情報を設定します。" },
      { id: "TAX_CLASSIFY", icon: "calculator", title: "利用課税区分管理", desc: "利用する課税区分を管理します。" },
      { id: "STORAGE_SHELF", icon: "mastersettingicon1", title: "棚基本情報設定", desc: "" },
      { id: "STORAGE", icon: "mastersettingicon2", title: "保管場所", desc: "" },
      { id: "ERROR_MAIL", icon: "errMail", title: "エラーメール管理", desc: "エラーになったメールを確認することができます。" },
      { id: "MASTER_APPROVAL_SETTING", icon: "mastersettingicon23", title: "マスタ承認設定", desc: "" }
    ]},
    { label: "組織関連設定", items: [
      { id: "COMPANY", icon: "mastersettingicon8", title: "会社基本情報設定", desc: "会社単位で基本情報を設定します。" },
      { id: "ORGANIZATION", icon: "mastersettingicon9", title: "組織基本情報設定", desc: "会社グループ・会社で利用する組織の設定をおこないます。会社の紐付けや所在地を設定できます。" },
      { id: "BUSSINESS_PLACE", icon: "mastersettingicon10", title: "拠点情報設定", desc: "組織とは別に支店や工場などがある場合、拠点情報を設定します。同一カタログで拠点別に価格を分けたり、商品ラインナップを変えることも可能です。" },
      { id: "COMPANY_POSITION", icon: "mastersettingicon11", title: "役職管理", desc: "部署内での役職名を設定します。" },
      { id: "USER", icon: "mastersettingicon12", title: "ユーザーと所属組織設定", desc: "ユーザー情報設定と所属部門ごとでの利用設定をおこないます。" },
      { id: "DELIVERY", icon: "mastersettingicon13", title: "納品先管理", desc: "納品先情報を設定します。" }
    ]},
    { label: "会計・経理", items: [
      { id: "ACCOUNT_TITLE", icon: "mastersettingicon15", title: "勘定科目管理", desc: "勘定科目コードや名称、表示順を設定します。" },
      { id: "COST_CENTER", icon: "mastersettingicon3", title: "原価センタ管理", desc: "原価センタコードや名称を設定します。" },
      { id: "INTERNAL_ORDER", icon: "mastersettingicon17", title: "内部指図管理", desc: "複数部門の費用管理に利用する項目を設定します。" }
    ]},
    { label: "購買基本設定", items: [
      { id: "PRODUCT_CATEGORY", icon: "mastersettingicon4", title: "品目カテゴリ設定・管理", desc: "利用品目カテゴリと関連情報を設定します。" },
      { id: "CATEGORY_ASSOCIATION", icon: "link", title: "品目カテゴリ関連付け", desc: "登録した品目カテゴリと標準品目カテゴリを紐付けます。" },
      { id: "ITEM_MANAGEMENT", icon: "listOl", title: "追加管理項目設定・管理", desc: "明細に追加する項目や検索条件とする管理項目を追加します。追加上限は、合計20項目までです。" },
      { id: "SPECIAL_CONTRACT", icon: "file-signature", title: "特約設定・管理", desc: "品目カテゴリごとに取引先との特約事項を設定します。" },
      { id: "DIRECT_TRADING", icon: "userPlus", title: "サプライヤ情報登録", desc: "サプライヤ情報の登録や取引に利用する設定をおこないます。" },
      { id: "PAYMENT_DESTINATION", icon: "money-check-alt", title: "支払先管理", desc: "取引先の支払先情報を管理します。" },
      { id: "SUPPLIER_RECEIVE_METHOD", icon: "userPlus", title: "取引サプライヤ設定（Faxサプライヤマスタ含める）", desc: "サプライヤ情報の登録や取引に利用する設定をおこないます。" },
      { id: "CATEGORY_ACCOUNT_ASSOCIATION", icon: "mastersettingicon5", title: "品目カテゴリ・勘定科目設定", desc: "費用負担部門（原価センタ）で購入する品目（品目カテゴリ）に毎に選択できる勘定科目を登録します。" },
      { id: "BUYER_COMPANY_PAYMENT_SITE", icon: "mastersettingicon6", title: "支払サイト管理", desc: "使用する支払サイトの登録・管理を行います。" },
      { id: "SEARCH_DICTIONARY", icon: "book-solid", title: "検索辞書", desc: "メーカー名などの表記ゆれ（揺れ語）をあらかじめ登録し、検索時に正規のメーカー名（変換後）へ自動変換して一意に統一するためのマスタです。" }
    ]},
    { label: "購買共通機能設定", items: [
      { id: "ESTIMATE_MENU", icon: "estimateMenu", title: "ゲートボタン管理", desc: "トップ画面に表示するゲートボタンを設定します。" },
      { id: "ESTIMATE_MENU_ORGANIZATION", icon: "siteMap", title: "ゲートボタン利用組織設定", desc: "各ゲートボタンを表示する組織を設定します。" },
      { id: "ESTIMATE_TEMPLATE", icon: "edit", title: "購買テンプレート管理", desc: "見積や発注で利用するテンプレートの作成や編集をおこないます。" },
      { id: "BANNER_MANAGEMENT", icon: "icon_share", title: "バナー管理", desc: "販売先トップ画面に表示するバナーを設定します。" }
    ]},
    { label: "購買取引機能設定", items: [
      { id: "ACCEPTANCE_GROUP", icon: "buyerUserGroup", title: "検収グループ条件設定", desc: "検収グループの定義や条件を設定します。" },
      { id: "APPLY_REASON", icon: "mastersettingicon14", title: "定型文選択", desc: "見積選定時の社内外に向けた採用・不採用理由等を定型文登録します。" },
      { id: "PURCHASE_GROUP", icon: "buyerUserGroup", title: "購買グループ管理", desc: "所属するユーザーや振り分け条件を設定します。" },
      { id: "APPROVAL_GROUP", icon: "buyerUserGroup", title: "承認グループ管理", desc: "所属するユーザーや振り分け条件を設定します。" },
      { id: "BIZ_TRADING", icon: "mastersettingicon20", title: "サプライヤ一覧・Biz取引", desc: "BizHiwayで取引するサプライヤを管理します。" },
      { id: "SETTING_DISPLAY_SUPPLIER", icon: "settingDisplaySupplier", title: "サプライヤ一覧表示設定", desc: "サプライヤリコメンデーション機能にてリコメンド時に表示するサプライヤ情報項目とリコメンドロジックの優先順を設定します。" },
      { id: "AUTO_ESTIMATE", icon: "autoEstimate", title: "自動見積・採否条件設定", desc: "自動見積・採否とする案件の条件を設定します。" },
      { id: "AUTO_ACCEPTANCE", icon: "mastersettingicon24", title: "自動検収条件設定", desc: "検収レスとする案件の条件を設定します。" },
      { id: "BIZ_PAYMENT", icon: "logo_bizhiway", title: "BizHiway利用設定", desc: "BizHiwayで利用する支払先コード等を設定します。" }
    ]},
    { label: "その他機能管理", items: [
      { id: "CATALOG_MALL_SYSTEM_LINK", icon: "mastersettingicon25", title: "カタログモールシステム連携情報", desc: "" },
      { id: "NOTIFICATION", icon: "buyerNotification", title: "お知らせ掲示設定", desc: "TOPページでユーザーにお知らせする掲載内容を設定します。参照URL・添付資料、追加掲載期間の設定が可能です。" },
      { id: "ACCEPTANCE_STOP_PERIOD", icon: "mastersettingicon26", title: "検収停止期間設定", desc: "締め処理時に検収をできないようにする" },
      { id: "HOLIDAY_SETTING", icon: "holidaysManagement", title: "休業日カレンダ設定", desc: "会社グループ、銀行の休業日を設定します。" },
      { id: "FOLDER_MANAGEMENT", icon: "mastersettingicon4", title: "フォルダ管理マスタ", desc: "部署内で共有ファイルを管理するフォルダを作成する。" }
    ]}
  ];

  var state = { keyword: "" };

  function navAttr(item) {
    return 'data-nav="マスタ設定詳細画面（eProcurement_Settings_MasterManagement_MasterSettingItem, masterType=10, masterDataType=' + item.id + '）"';
  }

  function itemCardHtml(item) {
    return '<div class="setting-item" ' + navAttr(item) + '>' +
      '<div class="icon-wrap"><img src="' + ICON_BASE + item.icon + '.svg" alt=""></div>' +
      '<div class="item-title">' + item.title + '</div>' +
      (item.desc ? '<div class="item-desc" title="' + item.desc + '">' + item.desc + '</div>' : '') +
      '</div>';
  }

  function render() {
    // マスタメニューリンク一覧 -- KHONG filter theo keyword
    document.getElementById('linkListBody').innerHTML = GROUPS.map(function (g) {
      return '<div class="link-list-group"><h6>' + g.label + '</h6>' +
        g.items.map(function (item) {
          return '<a href="#" ' + navAttr(item) + '>' + item.title + '</a>';
        }).join('') + '</div>';
    }).join('');

    // Luoi card chinh -- CO filter theo keyword (title + description)
    var kw = state.keyword.trim().toLowerCase();
    var visibleGroups = GROUPS.map(function (g) {
      var items = g.items.filter(function (item) {
        if (!kw) return true;
        return item.title.toLowerCase().includes(kw) || (item.desc && item.desc.toLowerCase().includes(kw));
      });
      return { label: g.label, items: items };
    }).filter(function (g) { return g.items.length > 0; });

    var sectionsEl = document.getElementById('groupSections');
    if (visibleGroups.length === 0) {
      sectionsEl.innerHTML = '<div class="empty-note">該当するマスタ設定項目が見つかりません。</div>';
    } else {
      sectionsEl.innerHTML = visibleGroups.map(function (g) {
        return '<div class="setting-group"><h5>' + g.label + '</h5><hr>' +
          '<div class="setting-grid">' + g.items.map(itemCardHtml).join('') + '</div></div>';
      }).join('');
    }
    JienieLayout.bindDataNavToasts();
  }

  // Search filter (live)
  document.getElementById('filterText').addEventListener('input', function (e) {
    state.keyword = e.target.value;
    render();
  });

  // Collapsible link list (mac dinh dong, dung theo data() thuc isShow=false)
  document.getElementById('linkListHeader').addEventListener('click', function () {
    this.classList.toggle('open');
    document.getElementById('linkListBody').classList.toggle('show');
  });

  // Dropdown 会社グループ (chon buyer khac -> SSO)
  document.getElementById('osSelect').addEventListener('change', function (e) {
    if (!e.target.value) return;
    var label = e.target.options[e.target.selectedIndex].text;
    JienieLayout.toast('実際の画面では「' + label + '」のBuyer環境へSSO遷移します');
    e.target.value = "";
  });

  render();
</script>

</body>
</html>
