<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J2 ProcureSuite — Mockup Navigator</title>
<style>
:root {
  --bg: #f1f5f9;
  --panel: #ffffff;
  --ink: #1e293b;
  --ink-sub: #64748b;
  --line: #e2e8f0;
  --brand: #2563eb;
  --brand-dark: #1d4ed8;
  --brand-soft: #eff6ff;
  --brand-border: #bfdbfe;
  --wip: #94a3b8;
  --wip-bg: #f1f5f9;
  --new: #ef4444;
  --new-bg: #fef2f2;
  --new-border: #fecaca;
  --shadow: 0 1px 3px rgba(15,23,42,0.08), 0 4px 14px rgba(15,23,42,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: Meiryo, "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  color: var(--ink);
  background: var(--bg);
  line-height: 1.6;
}

/* ===== TOP BAR ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(8px);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 1px 8px rgba(15,23,42,0.04);
}

.topbar-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  cursor: pointer;
  text-decoration: none;
}

.brand-logo {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(140deg, var(--brand-dark) 0%, #3b82f6 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -0.03em;
}

.brand-name { font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: 0.01em; }
.brand-name em { color: var(--brand); font-style: normal; }

.topnav {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

/* ---- Dropdown top menu (既存機能 / 新規機能) ---- */
.topmenu { position: relative; }
.topmenu-trigger {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 15px; border-radius: 8px; border: 1px solid transparent;
  background: none; font-family: inherit; font-size: 13px; font-weight: 700;
  color: var(--ink); cursor: pointer; transition: background 0.15s, color 0.15s;
}
.topmenu:hover .topmenu-trigger,
.topmenu-trigger:hover,
.topmenu-trigger.active { background: var(--brand-soft); color: var(--brand); }
.topmenu-trigger .caret { font-size: 9px; transition: transform 0.18s; }
.topmenu:hover .topmenu-trigger .caret { transform: rotate(180deg); }

/* invisible bridge so the dropdown doesn't close when crossing the gap */
.topmenu::after { content: ""; position: absolute; top: 100%; left: 0; right: 0; height: 8px; }

.topmenu-dropdown {
  position: absolute; top: calc(100% + 7px); left: 0;
  min-width: 250px; background: #fff; border: 1px solid var(--line);
  border-radius: 12px; box-shadow: var(--shadow);
  padding: 8px; display: none; flex-direction: column; gap: 2px; z-index: 120;
}
.topmenu:hover .topmenu-dropdown { display: flex; }
.topmenu-dropdown a {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 9px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
  color: var(--ink-sub); text-decoration: none; white-space: nowrap;
  transition: background 0.12s, color 0.12s;
}
.topmenu-dropdown a:hover { background: var(--brand-soft); color: var(--brand); }
.topmenu-dropdown a.active { background: var(--brand-soft); color: var(--brand); }
.topmenu-dropdown a.wip { color: var(--wip); font-weight: 500; }
.topmenu-dropdown a.wip:hover { background: var(--wip-bg); color: var(--wip); }
.dd-chips { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.dd-chip { font-size: 9px; font-weight: 800; border-radius: 8px; padding: 1px 6px; letter-spacing: 0.02em; }
.dd-chip.new { background: var(--new); color: #fff; }
.dd-chip.wip { background: var(--wip-bg); color: var(--wip); border: 1px solid var(--line); font-weight: 600; }

/* ===== HERO ===== */
.hero {
  max-width: 1240px;
  margin: 0 auto;
  padding: 52px 24px 24px;
  text-align: center;
}
.hero h1 { font-size: 30px; font-weight: 800; color: var(--ink); letter-spacing: 0.01em; }
.hero p { margin-top: 12px; font-size: 15px; color: var(--ink-sub); }
.hero .tags { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.hero .tag {
  font-size: 12px; padding: 4px 13px; border-radius: 20px;
  background: var(--panel); border: 1px solid var(--line); color: var(--ink-sub);
}
.hero .tag b { color: var(--brand); font-weight: 700; }

/* ===== SECTIONS ===== */
.sections { max-width: 1240px; margin: 0 auto; padding: 12px 24px 80px; }

.feature {
  scroll-margin-top: 74px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 28px 30px;
  margin-bottom: 26px;
  box-shadow: var(--shadow);
}
.feature.is-wip { background: #fafbfc; }

.feature-head { display: flex; align-items: flex-start; gap: 14px; }
.feature-icon {
  width: 44px; height: 44px; flex-shrink: 0;
  border-radius: 11px;
  background: var(--brand-soft);
  border: 1px solid var(--brand-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.feature.is-wip .feature-icon { background: var(--wip-bg); border-color: var(--line); filter: grayscale(0.6); opacity: 0.7; }
.feature-heading { flex: 1; }
.feature-heading h2 { font-size: 20px; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 10px; }
.feature-heading .desc { margin-top: 5px; font-size: 13.5px; color: var(--ink-sub); }

.badge-wip {
  font-size: 11px; font-weight: 600; color: var(--wip);
  background: var(--wip-bg); border: 1px solid var(--line);
  border-radius: 20px; padding: 2px 10px;
}
.badge-new {
  font-size: 11px; font-weight: 700; color: var(--new);
  background: var(--new-bg); border: 1px solid var(--new-border);
  border-radius: 20px; padding: 2px 10px;
}

/* Portal sub-sections */
.portals { margin-top: 22px; display: flex; flex-direction: column; gap: 18px; }
.portal { }
.portal-title {
  font-size: 12.5px; font-weight: 700; color: var(--brand);
  letter-spacing: 0.04em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.portal-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.portal-title.muted { color: var(--wip); }

.btn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 12px;
}

/* Function button (card) */
.fn {
  position: relative;
  border: 1px solid var(--line);
  border-radius: 11px;
  background: #fff;
  padding: 14px 15px;
  min-height: 66px;
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  cursor: default;
}
.fn:hover { border-color: var(--brand-border); box-shadow: 0 4px 14px rgba(37,99,235,0.12); transform: translateY(-1px); }

.fn-top { display: flex; align-items: flex-start; gap: 11px; }
.fn-icon {
  width: 34px; height: 34px; flex-shrink: 0;
  border-radius: 9px; background: var(--brand-soft); border: 1px solid var(--brand-border);
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.fn-textwrap { flex: 1; min-width: 0; }
.fn-id {
  font-family: "Consolas", "SF Mono", monospace;
  font-size: 10px; font-weight: 700; color: var(--brand);
  letter-spacing: 0.03em; opacity: 0.85;
}
.fn-name { margin-top: 2px; font-size: 13.5px; font-weight: 600; color: var(--ink); line-height: 1.35; }

/* hover overlay with 2 actions */
.fn-actions {
  position: absolute;
  inset: 0;
  display: flex;
  gap: 8px;
  padding: 12px;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(2px);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.15s;
}
.fn:hover .fn-actions,
.fn:focus-within .fn-actions { opacity: 1; visibility: visible; }

.fn-action {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 8px 6px;
  border-radius: 8px;
  font-size: 12.5px; font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.fn-action.explain { background: var(--brand-soft); color: var(--brand); border-color: var(--brand-border); }
.fn-action.explain:hover { background: #dbeafe; }
.fn-action.view { background: var(--brand); color: #fff; }
.fn-action.view:hover { background: var(--brand-dark); }
.fn-action svg { width: 13px; height: 13px; fill: currentColor; }

/* WIP placeholder */
.wip-placeholder {
  border: 1px dashed var(--line);
  border-radius: 11px;
  padding: 18px;
  text-align: center;
  font-size: 12.5px;
  color: var(--wip);
  background: #fcfcfd;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.45);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: 16px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(15,23,42,0.3);
  overflow: hidden;
  animation: pop 0.18s ease;
}
@keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: flex-start; gap: 12px;
}
.modal-head .m-icon {
  width: 38px; height: 38px; flex-shrink: 0; border-radius: 9px;
  background: var(--brand-soft); border: 1px solid var(--brand-border);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.modal-head .m-meta { flex: 1; }
.modal-head .m-crumb { font-size: 11.5px; color: var(--ink-sub); }
.modal-head .m-title { font-size: 16.5px; font-weight: 700; color: var(--ink); margin-top: 2px; }
.modal-head .m-id { font-family: "Consolas", monospace; font-size: 10.5px; font-weight: 700; color: var(--brand); margin-left: 6px; }
.modal-close {
  border: none; background: none; cursor: pointer; font-size: 22px;
  color: var(--ink-sub); line-height: 1; padding: 2px 4px;
}
.modal-close:hover { color: var(--ink); }
.modal-body { padding: 20px 24px; font-size: 14px; color: #334155; }
.modal-foot { padding: 14px 24px 20px; display: flex; justify-content: flex-end; gap: 10px; }
.m-btn {
  padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent;
}
.m-btn.secondary { background: #fff; border-color: var(--line); color: var(--ink-sub); }
.m-btn.secondary:hover { background: var(--bg); }
.m-btn.primary { background: var(--brand); color: #fff; }
.m-btn.primary:hover { background: var(--brand-dark); }

/* ===== FOOTER ===== */
.footer {
  border-top: 1px solid var(--line);
  background: #fff;
  padding: 22px 24px;
  text-align: center;
  font-size: 12.5px;
  color: var(--ink-sub);
}
.footer b { color: var(--ink); font-weight: 600; }

/* ===== SCROLL TOP ===== */
.scroll-top {
  position: fixed; right: 26px; bottom: 26px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--brand); color: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(37,99,235,0.4);
  opacity: 0; visibility: hidden; transform: translateY(10px);
  transition: opacity 0.2s, transform 0.2s, background 0.15s;
  z-index: 150;
}
.scroll-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
.scroll-top:hover { background: var(--brand-dark); }
.scroll-top svg { width: 18px; height: 18px; fill: #fff; }

@media (max-width: 640px) {
  .topbar-inner { gap: 14px; padding: 0 16px; }
  .brand-name { display: none; }
  .hero h1 { font-size: 24px; }
  .feature { padding: 22px 18px; }
}

/* ===== AUTH LOCK (client-side gate) ===== */
.auth-lock {
  position: fixed; inset: 0; z-index: 9999;
  background: #0f172a;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.auth-lock.hidden { display: none; }
.auth-box {
  width: 350px; max-width: 100%; background: #fff; border-radius: 16px;
  padding: 30px 28px; box-shadow: 0 20px 60px rgba(0,0,0,.45);
  display: flex; flex-direction: column; gap: 13px; text-align: center;
}
.auth-logo {
  width: 50px; height: 50px; margin: 0 auto 2px; border-radius: 13px;
  background: linear-gradient(140deg, #1d4ed8, #3b82f6);
  color: #fff; font-weight: 800; font-size: 19px; letter-spacing: -0.03em;
  display: flex; align-items: center; justify-content: center;
}
.auth-box h2 { font-size: 16px; color: #1e293b; margin: 0; }
.auth-box .auth-sub { font-size: 13px; color: #64748b; margin: -8px 0 4px; }
.auth-box label { text-align: left; font-size: 12.5px; font-weight: 600; color: #334155; display: flex; flex-direction: column; gap: 5px; }
.auth-box input { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 9px; font-size: 14px; font-family: inherit; }
.auth-box input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
.auth-error { display: none; color: #dc2626; font-size: 12.5px; }
.auth-error.show { display: block; }
.auth-btn { margin-top: 4px; padding: 11px; border: none; border-radius: 9px; background: #2563eb; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
.auth-btn:hover { background: #1d4ed8; }
.auth-note { font-size: 11px; color: #94a3b8; margin: 2px 0 0; line-height: 1.5; }
</style>
</head>
<body>

<!-- ===== AUTH LOCK (簡易アクセス制限・クライアントサイド) ===== -->
<div id="authLock" class="auth-lock">
  <form class="auth-box" id="authForm" autocomplete="off">
    <div class="auth-logo">J2</div>
    <h2>J2 ProcureSuite — モックアップ</h2>
    <p class="auth-sub">閲覧にはログインが必要です</p>
    <label>ユーザー名<input type="text" id="authUser" autocomplete="username"></label>
    <label>パスワード<input type="password" id="authPass" autocomplete="current-password"></label>
    <div class="auth-error" id="authError">ユーザー名またはパスワードが違います</div>
    <button type="submit" class="auth-btn">ログイン</button>
    <p class="auth-note">※ 簡易的なアクセス制限です。強固なセキュリティではありません。</p>
  </form>
</div>
<script>
/* ============================================================
   簡易アクセス制限（クライアントサイドの目隠し。真のセキュリティではない）
   - GitHub Pages 等の静的ホスティングでは真の認証は不可のため、あくまで
     casual なアクセス抑止。ソース表示や個別mockのURL直打ちで回避可能。
   認証情報の設定:
     AUTH.user      … ユーザー名
     AUTH.passHash  … パスワードの SHA-256（16進64文字）。設定時はこちらを優先（平文を隠せる・推奨）
     AUTH.passPlain … 平文パスワード（passHash 未設定時のフォールバック）
   ハッシュ生成: このページを開きコンソールで  await __genHash('新しいパスワード')
     → 出力(64文字)を passHash に貼り付け、passPlain を '' にする。
   ※ passHash 方式は HTTPS（GitHub Pages）で動作。file:// では crypto.subtle が使えないため平文方式のみ。
   ============================================================ */
(function () {
  const AUTH = {
    user: "jienie",
    passHash: "",                 // 例: "9f86d0818..."（64文字）。設定するとこちらが使われる
    passPlain: "@andyhoc"       // ← 公開前に必ず変更してください
  };
  const KEY = "j2mock_auth_ok";

  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
  }
  window.__genHash = sha256; // コンソールでのハッシュ生成用ヘルパー

  const lock = document.getElementById("authLock");
  const form = document.getElementById("authForm");
  const errEl = document.getElementById("authError");
  const userEl = document.getElementById("authUser");
  const passEl = document.getElementById("authPass");

  // セッション中に認証済みなら解除（タブを閉じるまで有効）
  try { if (sessionStorage.getItem(KEY) === "1") lock.classList.add("hidden"); } catch (e) {}
  if (!lock.classList.contains("hidden")) setTimeout(() => userEl.focus(), 50);

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    let ok = (userEl.value.trim() === AUTH.user);
    if (ok) {
      if (AUTH.passHash) {
        try { ok = (await sha256(passEl.value)) === AUTH.passHash.toLowerCase(); }
        catch (err) { ok = (passEl.value === AUTH.passPlain); } // file:// フォールバック
      } else {
        ok = (passEl.value === AUTH.passPlain);
      }
    }
    if (ok) {
      try { sessionStorage.setItem(KEY, "1"); } catch (e) {}
      lock.classList.add("hidden");
      errEl.classList.remove("show");
    } else {
      errEl.classList.add("show");
      passEl.value = "";
      passEl.focus();
    }
  });
})();
</script>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="#top">
      <span class="brand-logo">J2</span>
      <span class="brand-name">J2 <em>ProcureSuite</em></span>
    </a>
    <nav class="topnav" id="topnav"></nav>
  </div>

<a id="top"></a>

<!-- ===== HERO ===== -->
<section class="hero">

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div class="m-icon" id="m-icon">📋</div>

<footer class="footer">

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="トップへ戻る">

</button>

<script>
/* ============ DATA MODEL ============ */
const RFX = "buyer-portal/RFX機能/";
const FEATURES = [
  {
    id: "home", nav: "ログイン・ホーム", icon: "🏠",
    desc: "システムへのアクセスと、各機能への起点となる画面群です。",
    portals: {
      buyer: [
        { name: "ログイン画面", url: "buyer-portal/eProcurement_Login.html", role: "ユーザー認証を行うシステムの入口画面です。ID・パスワードによる本人確認とアクセス制御を担い、権限に応じたポータルへ導きます。" },
        { name: "ホーム画面", url: "buyer-portal/eProcurement_Home.html", role: "ログイン後の起点となるダッシュボードです。各機能への導線、通知、担当タスクのサマリーを一覧で確認できます。" }
      ],
      supplier: [
        { name: "トップページ／メインメニュー", url: "supplier-portal/BHW_MainMenu.html", role: "サプライヤーがログイン後に見る起点画面です。回答待ち・受注・検収・支払申請などのステータスをカウンター表示し、各業務機能への導線をまとめています。" }
      ], provider: []
    }
  },
  {
    id: "rfx", nav: "RFX機能", icon: "📋", isNew: true,
    desc: "RFI／RFPの作成から評価・Award確定まで、戦略的調達プロセス全体を管理する機能です。",

    desc: "在庫の入出庫・棚卸・適正在庫の可視化を行う機能です。", portals: { buyer: [], supplier: [], provider: [] } }

const PORTAL_LABELS = { buyer: "Buyer Portal", supplier: "Supplier Portal", provider: "Provider Portal" };

/* 画面ごとのアイコン（画面ID基準・-P1/-P2 は同一） */
const SCREEN_ICONS = {
  "SCR-001": "📋", "SCR-002": "📝", "SCR-003": "🗂️", "SCR-004": "📨", "SCR-005": "📑",
  "SCR-006": "💬", "SCR-007": "💬", "SCR-008": "📤", "SCR-009": "📊", "SCR-010": "🏆",
  "SCR-011": "🏅", "SCR-012": "✅", "SCR-P01": "⚙️"
};

/* 表示する機能（今は RFX機能 のみ。他機能を表示するには id を追加） */
const VISIBLE_IDS = ["rfx"];
const VISIBLE = FEATURES.filter(f => VISIBLE_IDS.includes(f.id));

/* ============ RENDER ============ */
const svgInfo = '<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2zm0-8h-2V7h2z"/></svg>';
const svgEye  = '<svg viewBox="0 0 24 24"><path d="M12 5c-5 0-9 4.5-10 7 1 2.5 5 7 10 7s9-4.5 10-7c-1-2.5-5-7-10-7zm0 11a4 4 0 110-8 4 4 0 010 8zm0-6a2 2 0 100 4 2 2 0 000-4z"/></svg>';

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function buildFnCard(f, feat, portalKey) {
  const baseId = (f.id || "").replace(/-P[12]$/, "");
  const icon = f.icon || SCREEN_ICONS[baseId] || feat.icon || "🖥️";
  const idHtml = f.id ? `<div class="fn-id">${esc(f.id)}</div>` : "";
  const payload = encodeURIComponent(JSON.stringify({
    icon: icon, feat: feat.nav, portal: PORTAL_LABELS[portalKey],
    title: f.name, id: f.id || "", role: f.role, url: f.url
  }));
  return `
    <div class="fn" tabindex="0">
      <div class="fn-top">
        <div class="fn-icon">${icon}</div>
        <div class="fn-textwrap">
          ${idHtml}
          <div class="fn-name">${esc(f.name)}</div>
        </div>
      </div>
      <div class="fn-actions">
        <div class="fn-action explain" onclick="openModal('${payload}')">${svgInfo}説明</div>
        <div class="fn-action view" onclick="window.open('${esc(f.url)}','_blank')">${svgEye}閲覧</div>
      </div>
    </div>`;
}

function buildPortal(feat, key) {
  const items = feat.portals[key] || [];
  const hasItems = items.length > 0;
  const titleCls = hasItems ? "" : "muted";
  let inner;
  if (hasItems) {
    inner = `<div class="btn-grid">${items.map(f => buildFnCard(f, feat, key)).join("")}</div>`;
  } else {
    inner = `<div class="wip-placeholder">準備中 — この Portal の画面は現在準備中です</div>`;
  }
  return `
    <div class="portal">
      <div class="portal-title ${titleCls}">${PORTAL_LABELS[key]}</div>
      ${inner}
    </div>`;
}

function renderSections() {
  const nav = document.getElementById("topnav");
  const sec = document.getElementById("sections");
  const heroTags = document.getElementById("hero-tags");

  const GROUPS = [
    { key: "existing", label: "既存機能" },
    { key: "new", label: "新規機能" }
  ];
  const groupOf = f => (f.isNew ? "new" : "existing");
  nav.innerHTML = GROUPS.map(g => {
    const feats = VISIBLE.filter(f => groupOf(f) === g.key);
    if (!feats.length) return "";
    const items = feats.map(f => {
      const chips =
        (f.isNew ? '<span class="dd-chip new">NEW</span>' : "") +
        (f.wip ? '<span class="dd-chip wip">準備中</span>' : "");
      return `<a href="#sec-${f.id}" data-target="sec-${f.id}" class="${f.wip ? "wip" : ""}">` +
             `<span>${esc(f.nav)}</span><span class="dd-chips">${chips}</span></a>`;
    }).join("");
    return `<div class="topmenu" data-group="${g.key}">
        <button class="topmenu-trigger" type="button">${esc(g.label)}<span class="caret">▾</span></button>
        <div class="topmenu-dropdown">${items}</div>
      </div>`;
  }).join("");

  sec.innerHTML = VISIBLE.map(f => `
    <section class="feature ${f.wip ? "is-wip" : ""}" id="sec-${f.id}">
      <div class="feature-head">
        <div class="feature-icon">${f.icon}</div>
        <div class="feature-heading">
          <h2>${esc(f.nav)} ${f.isNew ? '<span class="badge-new">NEW</span>' : ""} ${f.wip ? '<span class="badge-wip">準備中</span>' : ""}</h2>
          <div class="desc">${esc(f.desc)}</div>
        </div>
      </div>
      <div class="portals">
        ${["buyer","supplier","provider"].map(k => buildPortal(f, k)).join("")}
      </div>
    </section>
  `).join("");

  // hero tags: count screens of active features
  const tags = VISIBLE.filter(f => !f.wip).map(f => {
    const n = Object.values(f.portals).reduce((s,a)=>s+a.length,0);
    return `<span class="tag">${esc(f.nav)} — <b>${n}画面</b></span>`;
  });
  heroTags.innerHTML = tags.join("");
}

/* ============ MODAL ============ */
let currentUrl = "";
function openModal(payload) {
  const d = JSON.parse(decodeURIComponent(payload));
  document.getElementById("m-icon").textContent = d.icon;
  document.getElementById("m-crumb").textContent = d.feat + " › " + d.portal;
  document.getElementById("m-title").textContent = d.title;
  document.getElementById("m-id").textContent = d.id ? "  " + d.id : "";
  document.getElementById("m-body").textContent = d.role;
  currentUrl = d.url;
  document.getElementById("modal").classList.add("open");
}
function closeModal() { document.getElementById("modal").classList.remove("open"); }
document.getElementById("m-view").addEventListener("click", () => { if (currentUrl) window.open(currentUrl, "_blank"); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ============ SCROLL BEHAVIOR ============ */
function initScroll() {
  const btn = document.getElementById("scrollTop");
  const navLinks = [...document.querySelectorAll(".topmenu-dropdown a")];
  const menus = [...document.querySelectorAll(".topmenu")];
  const sections = VISIBLE.map(f => document.getElementById("sec-" + f.id));

  window.addEventListener("scroll", () => {
    btn.classList.toggle("show", window.scrollY > 400);
    // active nav highlight
    let activeId = null;
    const mid = window.scrollY + 120;
    sections.forEach(s => { if (s && s.offsetTop <= mid) activeId = s.id; });
    navLinks.forEach(a => a.classList.toggle("active", a.dataset.target === activeId));
    // highlight the group trigger that contains the active section
    menus.forEach(m => {
      const has = [...m.querySelectorAll("a")].some(a => a.dataset.target === activeId);
      m.querySelector(".topmenu-trigger").classList.toggle("active", has);
    });
  });
}

/* ============ INIT ============ */
renderSections();
initScroll();
</script>
